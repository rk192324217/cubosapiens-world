<!DOCTYPE html>
<html>

<head>

    <title>CUBO GPS CAM</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>


<body>

    <header>

        <h1>CUBO GPS CAM</h1>

    </header>


    <main class="app">


        <!-- LEFT PANEL -->

        <section class="left">

            <div class="image-box" id="imgBox">

                <img id="img">

                <div class="overlay" id="overlay">

                    <div id="ovLocation"></div>

                    <div class="ovRow">

                        <span id="ovLat"></span>

                        <span id="ovLon"></span>

                    </div>

                    <div id="ovDate"></div>

                    <div id="ovTime"></div>

                </div>

            </div>


            <div class="leftControls">

                <label class="btn">

                    Upload Image

                    <input type="file" id="imgInput">

                </label>

                <button class="btn" id="exportBtn">

                    Export Image

                </button>

            </div>

        </section>



        <!-- RIGHT PANEL -->

        <section class="right">


            <div class="panel">

                <h3>Map</h3>

                <div id="map"></div>

                <div class="mapBtns">

                    <button id="useGPS">

                        Use Current Location

                    </button>

                </div>


                <div class="coordBox">

                    <input id="coordInput" placeholder='13°07\' 20.5"N 80°15\'01.4"E'>

                    <button id="locateBtn">

                        Locate

                    </button>

                </div>

                <div id="locText"></div>

            </div>



            <div class="panel">

                <h3>Time</h3>

                <input type="time" id="time">

            </div>


            <div class="panel">

                <h3>Date</h3>

                <input type="date" id="date">

            </div>


        </section>


    </main>



    <script src="modules/image.js"></script>

    <script src="modules/map.js"></script>

    <script src="modules/datetime.js"></script>

    <script src="modules/overlay.js"></script>

    <script src="modules/export.js"></script>

    <script src="app.js"></script>


</body>

</html>
